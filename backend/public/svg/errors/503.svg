<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="100%" height="100%">
  <defs>
    <!-- Efek Bayangan Lembut -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#1e293b" flood-opacity="0.12" />
    </filter>

    <!-- Pola Garis Garis Kuning Hitam (Maintenance Pattern) -->
    <pattern id="barrier-stripes" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="20" height="40" fill="#fbbf24" />
      <rect x="20" width="20" height="40" fill="#1e293b" />
    </pattern>

    <!-- Gradasi metalik untuk roda gigi besar -->
    <radialGradient id="gearGradLarge" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="55%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#7c8b9e" />
    </radialGradient>

    <!-- Gradasi metalik untuk roda gigi kecil (oranye) -->
    <radialGradient id="gearGradSmall" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fdba74" />
      <stop offset="55%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea6a0a" />
    </radialGradient>

    <!-- Gradasi metalik untuk kunci inggris -->
    <linearGradient id="wrenchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c8b9e" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
  </defs>

  <!-- Background transparan -->
  <path d="M150,280 C200,240 320,240 380,270 C460,230 650,220 740,290 C820,260 900,270 950,330 L950,530 L150,530 Z" fill="#f8fafc" opacity="0.7" />
  <path d="M50,350 C130,310 230,360 320,330 C450,300 560,370 720,320 C820,330 920,290 980,370 L980,530 L50,530 Z" fill="#f1f5f9" opacity="0.45" />

  <!-- Garis Lantai -->
  <line x1="50" y1="530" x2="950" y2="530" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />

  <!-- GRUP ELEMEN UTAMA (Gears & Wrench) -->
  <g transform="translate(100, -120)" filter="url(#soft-shadow)">

    <!-- Roda Gigi Besar (Kiri Belakang) -->
    <g transform="translate(320, 240)" fill="url(#gearGradLarge)">
      <circle cx="0" cy="0" r="80" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" transform="rotate(45)" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" transform="rotate(90)" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" transform="rotate(135)" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" transform="rotate(180)" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" transform="rotate(225)" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" transform="rotate(270)" />
      <path d="M-20,-95 L20,-95 L30,-75 L-30,-75 Z" transform="rotate(315)" />
      <circle cx="0" cy="0" r="80" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2" />
      <circle cx="0" cy="0" r="30" fill="#ffffff" />
      <circle cx="0" cy="0" r="30" fill="none" stroke="#cbd5e1" stroke-width="2" />
    </g>

    <!-- Roda Gigi Kecil Oranye (Kanan Depan) — gigi digeser 22.5° agar bertautan -->
    <g transform="translate(460, 310) rotate(22.5)" fill="url(#gearGradSmall)">
      <circle cx="0" cy="0" r="55" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" transform="rotate(45)" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" transform="rotate(90)" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" transform="rotate(135)" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" transform="rotate(180)" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" transform="rotate(225)" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" transform="rotate(270)" />
      <path d="M-15,-65 L15,-65 L22,-50 L-22,-50 Z" transform="rotate(315)" />
      <circle cx="0" cy="0" r="55" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2" />
      <circle cx="0" cy="0" r="20" fill="#ffffff" />
      <circle cx="0" cy="0" r="20" fill="none" stroke="#fdba74" stroke-width="2" />
    </g>

    <!-- Kunci Inggris (Wrench) -->
    <g transform="translate(390, 260) rotate(-15)" fill="url(#wrenchGrad)">
      <rect x="-16" y="-10" width="32" height="180" rx="10" />
      <rect x="-8" y="10" width="16" height="130" rx="4" fill="#334155" />
      <circle cx="0" cy="-10" r="32" />
      <path d="M-16,-42 L16,-42 L24,-14 L-24,-14 Z" />
      <polygon points="-14,-45 14,-45 18,-18 0,-8 -18,-18" fill="#ffffff" />
      <circle cx="0" cy="170" r="22" />
      <circle cx="0" cy="170" r="10" fill="#ffffff" />
      <rect x="-14" y="-8" width="6" height="176" rx="3" fill="#ffffff" fill-opacity="0.25" />
    </g>
  </g>

  <!-- PALANG PEMBATAS (Under Construction Barrier) — papan diperbesar, teks di dalam -->
  <g transform="translate(260, 340)" filter="url(#soft-shadow)">

    <!-- Kaki Kiri Pembatas (diperpanjang mengikuti papan yang lebih besar) -->
    <path d="M40,70 L14,190 L46,190 L72,70 Z" fill="#475569" />
    <path d="M50,70 L76,190 L108,190 L82,70 Z" fill="#334155" />
    <!-- Kaki Kanan Pembatas -->
    <g transform="translate(480, 0) scale(-1, 1)">
      <path d="M40,70 L14,190 L46,190 L72,70 Z" fill="#475569" />
      <path d="M50,70 L76,190 L108,190 L82,70 Z" fill="#334155" />
    </g>

    <!-- Papan Atas (Garis Strip Kuning-Hitam) -->
    <rect x="0" y="0" width="480" height="50" rx="6" fill="#1e293b" />
    <rect x="5" y="5" width="470" height="40" rx="3" fill="url(#barrier-stripes)" />
    <rect x="5" y="5" width="470" height="40" rx="3" fill="none" stroke="#1e293b" stroke-width="1.5" />

    <!-- Papan Bawah — diperbesar agar teks "UNDER MAINTENANCE" muat di dalam -->
    <rect x="20" y="65" width="440" height="80" rx="10" fill="#1e293b" />
    <rect x="25" y="70" width="430" height="70" rx="6" fill="#fbbf24" />
    <rect x="25" y="70" width="430" height="70" rx="6" fill="none" stroke="#eab308" stroke-width="1.5" />

    <!-- Baut Papan (dengan highlight kecil) -->
    <circle cx="45" cy="105" r="5.5" fill="#475569" />
    <circle cx="43.5" cy="103.5" r="1.7" fill="#ffffff" fill-opacity="0.55" />
    <circle cx="435" cy="105" r="5.5" fill="#475569" />
    <circle cx="433.5" cy="103.5" r="1.7" fill="#ffffff" fill-opacity="0.55" />

    <!-- Teks di dalam papan kuning -->
    <text x="240" y="115" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="30" fill="#1e293b" text-anchor="middle" letter-spacing="1">UNDER MAINTENANCE</text>
  </g>

  <!-- TEKS INFORMASI — di bawah garis lantai -->
  <g transform="translate(500, 562)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="17" fill="#64748b" text-anchor="middle" letter-spacing="0.5">Kami sedang melakukan peningkatan sistem. Kami akan segera kembali!</text>
  </g>
</svg>