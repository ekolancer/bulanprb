<!--Angka 4-->
  <text x="150" y="235" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="200" fill="#2bb6c4" text-anchor="middle">4</text>
<!--Angka 3-->
  <text x="490" y="235" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="200" fill="#2bb6c4" text-anchor="middle">3</text>
<!--Titik navy kecil, menumpuk di angka 4 & cincin-->
